<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔力镜头 - The Magic Lens</title>
    <style>
        body { font-family: 'PingFang SC', sans-serif; background-color: #f0f8ff; text-align: center; margin: 0; padding: 20px; }
        #game-container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .image-display { width: 100%; height: 350px; background-color: #eee; border-radius: 10px; margin-bottom: 20px; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 4px solid #333; }
        .image-display img { max-width: 100%; max-height: 100%; object-fit: cover; }
        .word-bank { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .word-card { padding: 15px; background: #ffeb3b; border: 2px solid #fbc02d; border-radius: 8px; cursor: pointer; font-size: 1.5rem; font-weight: bold; transition: transform 0.2s; }
        .word-card:hover { transform: scale(1.05); background: #fff176; }
        #message { margin-top: 20px; font-size: 1.2rem; min-height: 1.5em; color: #555; }
        .score { font-size: 1.2rem; color: #2196F3; margin-bottom: 10px; }
        .success { color: #4caf50; font-weight: bold; animation: bounce 0.5s; }
        .error { color: #f44336; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

<div id="game-container">
    <h1>📷 魔力镜头 (The Magic Lens)</h1>
    <p>仔细观察照片，选出最适合形容它的词语！</p>
    <div class="score">分数 (Score): <span id="score">0</span></div>
    
    <div class="image-display">
        <img id="current-jpg" src="" alt="Game Image">
    </div>

    <div id="message"></div>

    <div class="word-bank" id="word-bank">
        </div>
</div>

<script>
    // Game Data: Using high-quality placeholder JPGs from Unsplash
    const gameData = [
        { img: "https://images.unsplash.com/photo-1464802686167-b939a6910659?q=80&w=600&auto=format&fit=crop", word: "黑漆漆", hint: "深夜的星空，背景是什么样的？" },
        { img: "https://images.unsplash.com/photo-1544568100-847a948585b9?q=80&w=600&auto=format&fit=crop", word: "乌溜溜", hint: "小狗的眼睛看起来亮晶晶、有神采吗？" },
        { img: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=600&auto=format&fit=crop", word: "蓝湛湛", hint: "大海深处那种浓郁的蓝色怎么说？" },
        { img: "https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?q=80&w=600&auto=format&fit=crop", word: "绿油油", hint: "雨后的草坪是不是像涂了油一样亮？" },
        { img: "https://images.unsplash.com/photo-1601275224155-21191b5f133f?q=80&w=600&auto=format&fit=crop", word: "黄澄澄", hint: "这些成熟的橘子看起来饱满吗？" },
        { img: "https://images.unsplash.com/photo-1491002052546-bf38f186af56?q=80&w=600&auto=format&fit=crop", word: "白茫茫", hint: "大雪把大地遮住了，一眼望不到头。" }
    ];

    const words = ["黑漆漆", "乌溜溜", "蓝湛湛", "绿油油", "黄澄澄", "白茫茫"];
    let currentIndex = 0;
    let score = 0;

    const imgElement = document.getElementById('current-jpg');
    const wordBank = document.getElementById('word-bank');
    const message = document.getElementById('message');
    const scoreDisplay = document.getElementById('score');

    function initGame() {
        // Load the first image
        imgElement.src = gameData[currentIndex].img;
        
        // Generate buttons
        wordBank.innerHTML = '';
        words.forEach(word => {
            const btn = document.createElement('div');
            btn.className = 'word-card';
            btn.innerText = word;
            btn.onclick = () => checkAnswer(word);
            wordBank.appendChild(btn);
        });
    }

    function checkAnswer(selectedWord) {
        const correctWord = gameData[currentIndex].word;
        if (selectedWord === correctWord) {
            score += 10;
            scoreDisplay.innerText = score;
            message.innerHTML = `<span class="success">太棒了！这是${selectedWord}的场景。</span>`;
            
            setTimeout(() => {
                nextLevel();
            }, 1500);
        } else {
            message.innerHTML = `<span class="error">不对哦，再观察一下。提示：${gameData[currentIndex].hint}</span>`;
        }
    }

    function nextLevel() {
        currentIndex++;
        if (currentIndex < gameData.length) {
            imgElement.src = gameData[currentIndex].img;
            message.innerText = "下一张照片来了...";
        } else {
            wordBank.innerHTML = "<h3>任务完成！你是一名优秀的摄影师！</h3>";
            imgElement.src = "https://images.unsplash.com/photo-1527529482837-4698179dc6ce?q=80&w=600&auto=format&fit=crop";
            message.innerText = "挑战结束，总分: " + score;
        }
    }

    initGame();
</script>

</body>
</html>
